name: Build and Deploy

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm run test:unit || echo "No tests to run or tests failed, proceeding..."

      - name: Generate static site
        run: pnpm run generate
        env:
          NUXT_PUBLIC_API_BASE_URL: ${{ secrets.NUXT_PUBLIC_API_BASE_URL }}
          NUXT_PUBLIC_IMAGES_FOLDER: ${{ secrets.NUXT_PUBLIC_IMAGES_FOLDER }}
          NUXT_PUBLIC_SITE_NAME: ${{ secrets.NUXT_PUBLIC_SITE_NAME }}
          NUXT_SITE_URL: ${{ secrets.NUXT_SITE_URL }}
          NUXT_SITE_NAME: ${{ secrets.NUXT_SITE_NAME }}
          NUXT_PUBLIC_GOOGLE_ANALYTICS_ID: ${{ secrets.NUXT_PUBLIC_GOOGLE_ANALYTICS_ID }}

      - name: Deploy to Cloudflare Pages
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')
        uses: cloudflare/pages-action@v1
        with:
          projectName: ${{ secrets.NUXT_PUBLIC_SITE_NAME }}
          directory: '.output/public'
