name: Build and Deploy

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm run test:unit || echo "No tests to run or tests failed, proceeding..."

      - name: Generate static site
        run: npm run generate
        env:
          NUXT_PUBLIC_API_BASE_URL: ${{ secrets.NUXT_PUBLIC_API_BASE_URL }}
          NUXT_PUBLIC_IMAGES_FOLDER: ${{ secrets.NUXT_PUBLIC_IMAGES_FOLDER }}
          NUXT_PUBLIC_SITE_NAME: ${{ secrets.NUXT_PUBLIC_SITE_NAME }}
          NUXT_SITE_URL: ${{ secrets.NUXT_SITE_URL }}
          NUXT_SITE_NAME: ${{ secrets.NUXT_SITE_NAME }}
          NUXT_PUBLIC_GOOGLE_ANALYTICS_ID: ${{ secrets.NUXT_PUBLIC_GOOGLE_ANALYTICS_ID }}

      - name: Deploy with Retry
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_wait_seconds: 120
          timeout_minutes: 10
          command: |
            eval $(ssh-agent -s)
            echo "${{ secrets.HUGONORTE_PRIVATE_SSH_KEY }}" | tr -d '\r' | ssh-add -
            rsync -avzr --delete -e "ssh -p 65002 -o StrictHostKeyChecking=no" .output/public/ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_IP }}:/home/${{ secrets.HOSTINGER_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/public_html/
